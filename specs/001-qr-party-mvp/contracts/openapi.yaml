openapi: 3.0.3
info:
  title: QR 기반 파티 모바일웹 API
  description: 파티 참여자 및 관리자 기능을 위한 실시간 API 명세서
  version: 1.0.0
servers:
  - url: http://localhost:58101
    description: 로컬 개발 서버

paths:
  /api/v1/participants/me:
    get:
      summary: 내 정보 및 현황판 조회
      responses:
        '200':
          description: 성공
    patch:
      summary: 닉네임 변경 (최대 3회)
      responses:
        '200':
          description: 성공

  /api/v1/messages:
    post:
      summary: 쪽지 보내기
      responses:
        '201':
          description: 발송 성공

  /api/v1/interactions/cupid:
    post:
      summary: 큐피트 발사 (매칭 제안)
      responses:
        '201':
          description: 발사 성공

  /api/v1/interactions/like:
    post:
      summary: 호감도 주기
      responses:
        '201':
          description: 반영 성공

  /api/v1/ranking:
    get:
      summary: 실시간 호감도 랭킹 조회
      responses:
        '200':
          description: 성공

  /api/v1/admin/session:
    patch:
      summary: [Admin] 파티 시간 및 상태 설정
      responses:
        '200':
          description: 업데이트 성공

  /api/v1/admin/alerts:
    get:
      summary: [Admin] SOS 및 시스템 알림 목록 조회
      responses:
        '200':
          description: 성공
